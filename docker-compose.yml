version: '3.8'

services:
  resume-editor:
    build: .
    container_name: resume-editor
    ports:
      - "80:5000"
    volumes:
      # Mount projects directory to persist data
      - ./projects:/app/projects
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
